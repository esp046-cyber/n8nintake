<style>
*{box-sizing:border-box;margin:0;padding:0}
.shell{background:var(--color-background-secondary);padding:1.5rem 1rem;border-radius:var(--border-radius-lg)}
.hero{background:#0F172A;border-radius:16px;padding:1.5rem 1.25rem 1.25rem;margin-bottom:1rem;position:relative;overflow:hidden}
.hero-a{position:absolute;top:-20px;right:-20px;width:100px;height:100px;border-radius:50%;background:#7F77DD;opacity:0.18}
.hero-b{position:absolute;bottom:-30px;left:10px;width:70px;height:70px;border-radius:50%;background:#1D9E75;opacity:0.15}
.badge{display:inline-flex;align-items:center;gap:6px;background:#1D9E75;color:#E1F5EE;font-size:11px;font-weight:500;padding:4px 10px;border-radius:20px;margin-bottom:10px}
.bdot{width:6px;height:6px;border-radius:50%;background:#E1F5EE}
.hero h1{font-size:20px;font-weight:500;color:#fff;line-height:1.3;margin-bottom:6px}
.hero p{font-size:13px;color:#94A3B8}
.prog-row{display:flex;align-items:center;gap:8px;margin-bottom:1rem}
.pip{height:3px;flex:1;border-radius:2px;background:var(--color-border-tertiary);transition:background 0.3s}
.pip.done{background:#7F77DD}
.slabel{font-size:12px;color:var(--color-text-secondary);white-space:nowrap}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:16px;padding:1.25rem;margin-bottom:1rem}
.cicon{width:36px;height:36px;border-radius:10px;background:#EEEDFE;display:flex;align-items:center;justify-content:center;margin-bottom:12px}
.qtitle{font-size:15px;font-weight:500;color:var(--color-text-primary);margin-bottom:3px}
.qsub{font-size:12px;color:var(--color-text-secondary);margin-bottom:14px}
.opt{display:flex;align-items:center;justify-content:space-between;padding:11px 12px;border-radius:10px;border:0.5px solid var(--color-border-tertiary);cursor:pointer;gap:12px;margin-bottom:8px;transition:border-color 0.15s,background 0.15s}
.opt:hover{border-color:#7F77DD;background:#EEEDFE}
.opt.sel{border-color:#7F77DD;background:#EEEDFE}
.opt-label{font-size:14px;color:var(--color-text-primary)}
.opt.sel .opt-label{color:#3C3489;font-weight:500}
.ctrl{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--color-border-secondary);flex-shrink:0;transition:all 0.15s}
.ctrl.sq{border-radius:5px}
.ctrl.on{background:#7F77DD;border-color:#7F77DD;display:flex;align-items:center;justify-content:center}
.ctrl.on::after{content:'';display:block;width:7px;height:7px;border-radius:50%;background:#fff}
.ctrl.sq.on::after{width:11px;height:9px;background:url("data:image/svg+xml,%3Csvg viewBox='0 0 11 9' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 4.5L4 7.5L10 1' stroke='white' stroke-width='1.8' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E") center/contain no-repeat;border-radius:0}
input[type=text],input[type=email],input[type=tel],textarea{width:100%;font-size:14px;padding:10px 12px;border:0.5px solid var(--color-border-secondary);border-radius:10px;background:var(--color-background-secondary);color:var(--color-text-primary);outline:none;font-family:var(--font-sans);transition:border-color 0.15s}
input:focus,textarea:focus{border-color:#7F77DD}
textarea{resize:vertical;min-height:80px}
.flabel{font-size:12px;color:var(--color-text-secondary);margin-bottom:5px;margin-top:12px}
.btn-row{display:flex;gap:8px}
.bbk{padding:13px 18px;background:transparent;border:0.5px solid var(--color-border-secondary);border-radius:12px;font-size:14px;color:var(--color-text-secondary);cursor:pointer;font-family:var(--font-sans)}
.bnx{flex:1;padding:13px;background:#7F77DD;color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:500;cursor:pointer;font-family:var(--font-sans);transition:background 0.15s}
.bnx:hover{background:#534AB7}
.bnx:disabled{background:#AFA9EC;cursor:not-allowed}
.toast{display:none;padding:10px 14px;border-radius:10px;font-size:13px;margin-bottom:10px;border:0.5px solid}
.toast.err{background:var(--color-background-danger);color:var(--color-text-danger);border-color:var(--color-border-danger)}
</style>

<div class="shell">
<h2 style="position:absolute;left:-9999px">n8n automation intake form</h2>
<div class="hero">
  <div class="hero-a"></div><div class="hero-b"></div>
  <div class="badge"><div class="bdot"></div>n8n automation specialist</div>
  <h1>Let's automate your business</h1>
  <p>Answer 9 quick questions — get a custom proposal in 24hrs</p>
</div>
<div class="prog-row">
  <div id="pips" style="display:flex;gap:5px;flex:1"></div>
  <span class="slabel" id="slabel">1 of 9</span>
</div>
<div id="toast" class="toast"></div>
<div id="card" class="card"></div>
<div class="btn-row" id="btnrow">
  <button class="bbk" id="backBtn" onclick="goBack()">&#8592;</button>
  <button class="bnx" id="nextBtn" onclick="goNext()">Continue &rarr;</button>
</div>
</div>

<script>
const SCRIPT_URL="https://script.google.com/macros/s/AKfycbwlRNVKfWktGiNttt81oAt4pAJgQZDxWEtLnfXwL7dBJ7GsNTaR9GfJ3lwg5jcUxZ4-Hw/exec";
const icons=[
  '<svg width="18" height="18" viewBox="0 0 18 18" fill="none"><rect x="2" y="2" width="6" height="6" rx="1.5" fill="#7F77DD"/><rect x="10" y="2" width="6" height="6" rx="1.5" fill="#AFA9EC"/><rect x="2" y="10" width="6" height="6" rx="1.5" fill="#AFA9EC"/><rect x="10" y="10" width="6" height="6" rx="1.5" fill="#CECBF6"/></svg>',
  '<svg width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="9" cy="9" r="7" stroke="#7F77DD" stroke-width="1.5"/><path d="M6 9h6M9 6v6" stroke="#7F77DD" stroke-width="1.5" stroke-linecap="round"/></svg>',
  '<svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M3 14l4-4 3 3 5-7" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>',
  '<svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 2v4M9 12v4M2 9h4M12 9h4" stroke="#7F77DD" stroke-width="1.5" stroke-linecap="round"/><circle cx="9" cy="9" r="3" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1.5"/></svg>',
  '<svg width="18" height="18" viewBox="0 0 18 18" fill="none"><rect x="2" y="4" width="14" height="10" rx="2" stroke="#7F77DD" stroke-width="1.5"/><path d="M6 8h6M6 11h4" stroke="#7F77DD" stroke-width="1.5" stroke-linecap="round"/></svg>',
  '<svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 2L11 7h5l-4 3 1.5 5L9 12l-4.5 3L6 10 2 7h5z" stroke="#7F77DD" stroke-width="1.5" stroke-linejoin="round"/></svg>',
  '<svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M3 6h12M3 9h8M3 12h10" stroke="#7F77DD" stroke-width="1.5" stroke-linecap="round"/></svg>',
  '<svg width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="9" cy="9" r="7" stroke="#7F77DD" stroke-width="1.5"/><path d="M9 5v4l3 2" stroke="#7F77DD" stroke-width="1.5" stroke-linecap="round"/></svg>',
  '<svg width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="9" cy="6" r="3" stroke="#7F77DD" stroke-width="1.5"/><path d="M3 16c0-3.314 2.686-6 6-6s6 2.686 6 6" stroke="#7F77DD" stroke-width="1.5" stroke-linecap="round"/></svg>'
];
const steps=[
  {type:'radio',icon:0,title:'What best describes your business?',options:['Solo entrepreneur / freelancer','Small business (2–20 people)','Mid-size company (20–200)','Enterprise (200+)','Agency / consultancy']},
  {type:'check',icon:1,title:'What tools do you currently use?',sub:'Select all that apply',options:['CRM (HubSpot, Salesforce, etc.)','Email marketing (Mailchimp, ActiveCampaign)','Spreadsheets (Google Sheets, Airtable)','E-commerce (Shopify, WooCommerce)','Project management (Notion, Asana, Trello)','Accounting (QuickBooks, Xero)','Other / not sure']},
  {type:'check',icon:2,title:'What do you want to automate?',sub:'Select all that apply',options:['Lead capture & CRM updates','Invoice / payment notifications','Report generation & data sync','Email / Slack / WhatsApp alerts','Social media scheduling','File & document management','Custom API integrations']},
  {type:'radio',icon:3,title:'How are you handling this today?',options:['Manually (copy-paste, spreadsheets)','Partial automation (Zapier / Make)','Broken or no process at all','Already have n8n, need help improving']},
  {type:'radio',icon:4,title:'Desired timeline to go live?',options:['ASAP (within 2 weeks)','Standard (1 month)','Planning phase (1–3 months)','Just exploring for now']},
  {type:'radio',icon:5,title:'Project budget',options:['$200 – $500','$500 – $1,500','$1,500 – $5,000','$5,000+','Not sure yet']},
  {type:'check',icon:6,title:'How should we send your proposal?',sub:'Select all that apply',options:['WhatsApp','Work email','LinkedIn message','Zoom / Google Meet call']},
  {type:'text',icon:7,title:'Any existing tools, docs, or links?',sub:"Paste a URL, Notion page, or Loom video. Type 'none' if N/A.",placeholder:'e.g. https://notion.so/my-process'},
  {type:'contact',icon:8,title:'Almost done — your contact info',sub:'We assign a specialist within 24 hours.'}
];
let cur=0,ans=steps.map(()=>[]);
let cd={name:'',company:'',email:'',phone:'',painPoint:''};
function renderPips(){
  document.getElementById('pips').innerHTML=steps.map((_,i)=>`<div class="pip${i<=cur?' done':''}"></div>`).join('');
  document.getElementById('slabel').textContent=`${cur+1} of ${steps.length}`;
}
function showToast(msg,type){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className=`toast ${type}`;t.style.display='block';
}
function render(){
  renderPips();
  const s=steps[cur];
  const c=document.getElementById('card');
  document.getElementById('backBtn').style.visibility=cur===0?'hidden':'visible';
  let html=`<div class="cicon">${icons[s.icon]}</div><div class="qtitle">${s.title}</div>${s.sub?`<div class="qsub">${s.sub}</div>`:'<div style="margin-bottom:14px"></div>'}`;
  if(s.type==='radio'||s.type==='check'){
    const sq=s.type==='check';
    html+=s.options.map((o,i)=>{
      const on=ans[cur].includes(i);
      return `<div class="opt${on?' sel':''}" onclick="pick(${i})"><span class="opt-label">${o}</span><div class="ctrl${sq?' sq':''}${on?' on':''}"></div></div>`;
    }).join('');
  } else if(s.type==='text'){
    html+=`<input type="text" placeholder="${s.placeholder}" value="${ans[cur][0]||''}" oninput="ans[cur]=[this.value]">`;
  } else {
    html+=`
      <div class="flabel">Full name *</div><input type="text" placeholder="Your name" value="${cd.name}" oninput="cd.name=this.value">
      <div class="flabel">Company name</div><input type="text" placeholder="Optional" value="${cd.company}" oninput="cd.company=this.value">
      <div class="flabel">Work email *</div><input type="email" placeholder="you@company.com" value="${cd.email}" oninput="cd.email=this.value">
      <div class="flabel">WhatsApp / phone</div><input type="tel" placeholder="+63 9XX XXX XXXX" value="${cd.phone}" oninput="cd.phone=this.value">
      <div class="flabel">Briefly describe your main pain point</div>
      <textarea placeholder="e.g. I manually copy leads from Facebook Ads into a spreadsheet every day..." oninput="cd.painPoint=this.value">${cd.painPoint}</textarea>`;
  }
  c.innerHTML=html;
}
function pick(i){
  const s=steps[cur];
  if(s.type==='radio'){ans[cur]=[i];}
  else{const x=ans[cur].indexOf(i);x>-1?ans[cur].splice(x,1):ans[cur].push(i);}
  render();
}
function getLabel(si,indices){
  if(!indices||!indices.length)return '';
  return indices.map(i=>steps[si].options[i]).join(', ');
}
async function submitToSheets(){
  const btn=document.getElementById('nextBtn');
  btn.disabled=true;btn.textContent='Submitting...';
  const payload={
    businessType:getLabel(0,ans[0]),tools:getLabel(1,ans[1]),
    automate:getLabel(2,ans[2]),currentProcess:getLabel(3,ans[3]),
    timeline:getLabel(4,ans[4]),budget:getLabel(5,ans[5]),
    channel:getLabel(6,ans[6]),links:ans[7][0]||'',
    name:cd.name,company:cd.company,email:cd.email,phone:cd.phone,painPoint:cd.painPoint
  };
  try{
    await fetch(SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    showSuccess();
  }catch(err){
    showToast('Submission failed. Please try again.','err');
    btn.disabled=false;btn.textContent='Submit';
  }
}
function showSuccess(){
  document.getElementById('card').innerHTML=`
    <div style="text-align:center;padding:2rem 1rem">
      <div style="width:56px;height:56px;border-radius:50%;background:#EEEDFE;display:flex;align-items:center;justify-content:center;margin:0 auto 16px">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M5 12l5 5L20 7" stroke="#7F77DD" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="qtitle" style="font-size:17px;margin-bottom:8px">You're all set!</div>
      <div class="qsub" style="font-size:14px">Thank you! We've received your details and will be in touch within 24 hours with a custom proposal.</div>
    </div>`;
  document.getElementById('btnrow').style.display='none';
  document.getElementById('toast').style.display='none';
  renderPips();
}
function goNext(){
  if(cur===steps.length-1){
    if(!cd.name||!cd.email){showToast('Please fill in your name and email.','err');return;}
    submitToSheets();
  } else {cur++;render();}
}
function goBack(){if(cur>0){cur--;render();}}
render();
</script>
